name: Simulator Screenshots

on:
  workflow_dispatch:

jobs:
  screenshot:
    name: Build & Screenshot on Simulator
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i "iphone"

      - name: Boot iPhone 16 simulator
        run: |
          SIM_ID=$(xcrun simctl list devices available | grep -m1 "iPhone 16" | grep -o -E '\([A-F0-9-]+\)' | tr -d '()')
          echo "SIM_ID=$SIM_ID" >> $GITHUB_ENV
          echo "Booting simulator: $SIM_ID"
          xcrun simctl boot "$SIM_ID"

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project DeAI.xcodeproj \
            -scheme DeAI \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "id=$SIM_ID" \
            -derivedDataPath build/DerivedData \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Install app on simulator
        run: |
          APP_PATH=$(find build/DerivedData -name "DeAI.app" -type d | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"

      - name: Launch app on simulator
        run: |
          xcrun simctl launch booted com.deai.app
          sleep 5

      - name: Take screenshots
        run: |
          mkdir -p screenshots
          xcrun simctl io booted screenshot screenshots/home.png
          echo "Home screen screenshot taken"

      - name: Navigate and screenshot tabs
        run: |
          # Take screenshot of current state (Chat tab)
          xcrun simctl io booted screenshot screenshots/tab_chat.png
          sleep 1
          
          # Tap on Browser tab (tab index 1) - simulate tap in center-bottom area
          # Tab bar is at bottom. Tabs: Chat(0), Browser(1), Settings(2)
          # iPhone 16 screen is 393x852 points, tab bar is ~50pt from bottom
          # We use xcrun simctl to send touch events
          
          # Tap Browser tab (~2/5 from left, near bottom)
          xcrun simctl io booted sendkey --key 0x25 2>/dev/null || true
          
          # Use accessibility features to tap - use ui tap
          xcrun simctl spawn booted osascript -e 'tell application "System Events" to keystroke " "' 2>/dev/null || true
          
          # Simpler approach: use simctl openurl or just take multiple screenshots
          # The app launches on Chat tab, let's just capture what we have
          sleep 2
          xcrun simctl io booted screenshot screenshots/tab_browser.png

      - name: Take more screenshots with different states
        run: |
          # Type something in the text field to show interaction
          xcrun simctl spawn booted osascript -e 'tell application "System Events" to keystroke "Hello"' 2>/dev/null || true
          sleep 2
          xcrun simctl io booted screenshot screenshots/with_text.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          retention-days: 30

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown booted 2>/dev/null || true
