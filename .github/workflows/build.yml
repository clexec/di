name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project DeAI.xcodeproj \
            -scheme DeAI \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/DeAI.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/DeAI.xcarchive/Products/Applications/DeAI.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../DeAI.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeAI.ipa
          path: DeAI.ipa
          retention-days: 30
