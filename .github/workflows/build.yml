name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-26
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project DeAI.xcodeproj \
            -scheme DeAI \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/DeAI.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Create IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/DeAI.xcarchive/Products/Applications/DeAI.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../DeAI.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeAI.ipa
          path: DeAI.ipa
          retention-days: 30

  screenshots:
    name: Take Screenshots
    runs-on: macos-26
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone

      - name: Find Simulator & Build
        run: |
          # Find the first available iPhone simulator
          SIM_INFO=$(xcrun simctl list devices available | grep "iPhone" | head -1)
          echo "Found simulator: $SIM_INFO"
          
          SIM_NAME=$(echo "$SIM_INFO" | sed 's/(.*//' | xargs)
          SIM_UUID=$(echo "$SIM_INFO" | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          SIM_OS=$(echo "$SIM_INFO" | grep -oE '\([0-9]+\.[0-9]+\)' | tr -d '()')
          
          echo "SIM_NAME=$SIM_NAME" >> $GITHUB_ENV
          echo "SIM_UUID=$SIM_UUID" >> $GITHUB_ENV
          echo "SIM_OS=$SIM_OS" >> $GITHUB_ENV
          echo "Using: $SIM_NAME (iOS $SIM_OS) UUID=$SIM_UUID"
          
          # Build for simulator using the found OS version
          xcodebuild build \
            -project DeAI.xcodeproj \
            -scheme DeAI \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=$SIM_NAME,OS=$SIM_OS" \
            -derivedDataPath build/DerivedData \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot Simulator & Take Screenshots
        run: |
          mkdir -p screenshots
          
          APP_PATH=$(find build/DerivedData -name "DeAI.app" -type d | head -1)
          echo "App path: $APP_PATH"
          echo "Using simulator: $SIM_NAME ($SIM_UUID) iOS $SIM_OS"
          
          # Erase and boot
          xcrun simctl shutdown "$SIM_UUID" 2>/dev/null || true
          xcrun simctl erase "$SIM_UUID" 2>/dev/null || true
          xcrun simctl boot "$SIM_UUID" 2>/dev/null || true
          sleep 20
          
          # Install and launch app
          xcrun simctl install "$SIM_UUID" "$APP_PATH"
          xcrun simctl launch "$SIM_UUID" com.deai.app
          sleep 10
          
          # Screenshot 1 - Main screen
          xcrun simctl io "$SIM_UUID" screenshot screenshots/01_main_chat.png
          echo "✅ Screenshot 1 - Main chat screen"
          
          sleep 3
          
          # Screenshot 2 - After idle
          xcrun simctl io "$SIM_UUID" screenshot screenshots/02_idle.png
          echo "✅ Screenshot 2 - Idle state"
          
          # Shutdown
          xcrun simctl shutdown "$SIM_UUID" 2>/dev/null || true

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: Screenshots
          path: screenshots/
          retention-days: 30
