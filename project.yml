name: DeAI
options:
  bundleIdPrefix: com.deai
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  DeAI:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - ".github"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deai.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_CFBundleDisplayName: "DeAI"
        INFOPLIST_KEY_CFBundleShortVersionString: "1.0.0"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: DeAI
        CFBundleName: DeAI
        CFBundleIdentifier: com.deai.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        LSRequiresIPhoneOS: YES
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: NO
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
